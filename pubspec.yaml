name: symons_app
description: "Symon's Kitchin — Food Delivery Marketplace"
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.1
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  image_picker: ^1.2.2
  cached_network_image: ^3.4.1
  http: ^1.6.0
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.0
  cloud_functions: ^6.3.2
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.2
  pointer_interceptor: ^0.10.1+2
  flutter_ringtone_player: ^4.0.0+4
  flutter_callkit_incoming: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Local fork of flutter_callkit_incoming: the order-alert "call" never records
# audio or uses the camera, so the foreground service uses the PHONE_CALL type
# only (mic/camera FGS types + permissions removed) to satisfy Google Play.
# See third_party/flutter_callkit_incoming/.../CallkitNotificationService.kt
dependency_overrides:
  flutter_callkit_incoming:
    path: third_party/flutter_callkit_incoming

flutter:
  uses-material-design: true

  assets:
    - assets/images/restaurant_cover.png
    - assets/images/driver_marker.png
    - assets/images/light_meals/
    - assets/images/main_meals/
    - assets/images/grills/
    - assets/images/combos/
    - assets/images/platters/
    - assets/images/cuts/
    - assets/images/beverages/
